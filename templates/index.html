<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animal AI Classifier</title>

<style>
/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0a0f0a;
    color: #eaffea;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ===== CONTAINER ===== */
.container {
    width: 420px;
    background: #0f1a0f;
    border: 1px solid #00ff88;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,255,136,0.2);
}

/* ===== TITLE ===== */
h1 {
    color: #00ff88;
    margin-bottom: 20px;
}

/* ===== FILE INPUT ===== */
input[type="file"] {
    background: #0a0f0a;
    border: 1px solid #00ff88;
    padding: 10px;
    border-radius: 10px;
    color: #00ff88;
    width: 100%;
}

/* ===== BUTTON ===== */
button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #00ff88, #00cc66);
    border: none;
    border-radius: 12px;
    color: black;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00ff88;
}

/* ===== IMAGE PREVIEW ===== */
.preview {
    margin-top: 20px;
}

.preview img {
    width: 100%;
    border-radius: 15px;
    border: 2px solid #00ff88;
}

/* ===== RESULT ===== */
.result {
    margin-top: 15px;
    font-size: 22px;
    font-weight: bold;
    color: #00ff88;
}

/* ===== LOADING ===== */
.loader {
    margin-top: 15px;
    display: none;
    color: #00ff88;
    font-size: 14px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity: 1;}
    50% {opacity: 0.3;}
    100% {opacity: 1;}
}
</style>

</head>
<body>

<div class="container">
    <h1>🐾 Animal AI</h1>

    <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit">🔍 Analisis Sekarang</button>
    </form>

    <div class="loader" id="loader">
        ⏳ AI sedang menganalisis...
    </div>

    {% if image_path %}
    <div class="preview">
        <img src="{{ image_path }}">
    </div>
    {% endif %}

    {% if prediction %}
    <div class="result">
        Hasil: {{ prediction }}
    </div>
    {% endif %}
</div>

<script>
function showLoader(){
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
